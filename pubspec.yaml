name: auto_guardian
description: A mobile interface for the AutoGuardian anti-theft system.
publish_to: 'none'

environment:
  sdk: ">=2.18.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  dio: ^5.4.2+1
  flutter_secure_storage: ^9.0.0
  google_fonts: ^6.1.0
  google_maps_flutter: ^2.5.0
  flutter_dotenv: ^5.1.0
  http: ^1.2.1
  socket_io_client: ^2.0.3
  geolocator: ^11.0.0
  url_launcher: ^6.2.5
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
